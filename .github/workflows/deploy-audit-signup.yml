name: Deploy audit-signup Worker

on:
  push:
    branches:
      - main
    paths:
      - 'workers/audit-signup/**'
      - '.github/workflows/deploy-audit-signup.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/audit-signup

      - name: Set Worker Secrets
        working-directory: workers/audit-signup
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_GITHUB_TOKEN: ${{ secrets.GIT_HUBTOKEN_AFO }}
          SECRET_EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          SECRET_EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          SECRET_EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SECRET_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: |
          npm install -g wrangler
          printf '%s' "$SECRET_GITHUB_TOKEN" | wrangler secret put GITHUB_TOKEN
          printf '%s' "$SECRET_EMAIL_PROVIDER" | wrangler secret put EMAIL_PROVIDER
          printf '%s' "$SECRET_EMAIL_API_KEY" | wrangler secret put EMAIL_API_KEY
          printf '%s' "$SECRET_EMAIL_FROM" | wrangler secret put EMAIL_FROM
          printf '%s' "$SECRET_ADMIN_EMAIL" | wrangler secret put ADMIN_EMAIL
