name: Deploy visibility-snapshot Worker

on:
  push:
    branches:
      - main
    paths:
      - 'workers/visibility-snapshot/**'
      - '.github/workflows/deploy-visibility-snapshot.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/visibility-snapshot

      - name: Set Worker Vars and Secrets
        working-directory: workers/visibility-snapshot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_TURNSTILE: ${{ secrets.TURNSTILE_SECRET }}
          VAR_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: |
          npm install -g wrangler
          printf '%s' "$SECRET_TURNSTILE" | wrangler secret put TURNSTILE_SECRET
          printf '%s' "$VAR_TURNSTILE_SITE_KEY" | wrangler secret put TURNSTILE_SITE_KEY
