name = "afo-visibility-snapshot"
main = "index.js"
compatibility_date = "2024-09-23"

# Routes: owns /start, /results, and /api/visibility-snapshot only.
# afo-site Worker owns the wildcard catch-all (agentfeedoptimization.com/*).
routes = [
  { pattern = "agentfeedoptimization.com/start", zone_name = "agentfeedoptimization.com" },
  { pattern = "agentfeedoptimization.com/results", zone_name = "agentfeedoptimization.com" },
  { pattern = "agentfeedoptimization.com/api/visibility-snapshot", zone_name = "agentfeedoptimization.com" }
]

[[d1_databases]]
binding = "DB"
database_name = "afo-v1"
database_id = "ccbd076e-aaa7-42bb-8808-a20bd83569e2"

[vars]
# Secrets managed via Cloudflare dashboard:
# TURNSTILE_SECRET
# NOTIFY_EMAIL
# NOTIFY_FROM
SNAPSHOT_RATE_LIMIT_WINDOW_HOURS = "24"
SNAPSHOT_MAX_PER_DOMAIN = "3"

[observability]
  [observability.logs]
  enabled = true
  invocation_logs = true
